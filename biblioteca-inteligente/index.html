<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc; --primary: #0f172a; --accent: #4f46e5;
            --accent-hover: #4338ca; --card-bg: #ffffff; --text-main: #1e293b;
            --text-muted: #64748b; --border: #e2e8f0; --success: #10b981;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .hidden { display: none !important; }
        .app-container { width: 100%; max-width: 1100px; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .view { width: 100%; display: flex; flex-direction: column; align-items: center; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* PAINEIS GERAIS */
        .card-panel { background: var(--card-bg); padding: 40px; border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); width: 100%; max-width: 450px; box-sizing: border-box; }
        .logo-header { text-align: center; margin-bottom: 30px; }
        .logo-header i { font-size: 3rem; color: var(--accent); margin-bottom: 15px; }
        .logo-header h1 { margin: 0; font-size: 1.5rem; color: var(--primary); }

        .input-wrapper { position: relative; margin-bottom: 15px; width: 100%;}
        .input-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .input-wrapper input, .input-wrapper select { width: 100%; padding: 12px 12px 12px 40px; border: 1px solid var(--border); border-radius: 12px; box-sizing: border-box; font-size: 1rem; font-family: 'Inter', sans-serif; background: var(--card-bg); }
        .input-wrapper input:focus, .input-wrapper select:focus { outline: none; border-color: var(--accent); }

        .btn { background-color: var(--accent); color: white; border: none; padding: 14px 24px; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px; transition: 0.2s; }
        .btn:hover { background-color: var(--accent-hover); }
        .btn-danger { background-color: #ef4444; } .btn-danger:hover { background-color: #dc2626; }

        .tags-grid { display: flex; flex-wrap: wrap; gap: 12px; margin: 25px 0; justify-content: center; }
        .tag { padding: 10px 20px; border: 1px solid var(--border); border-radius: 30px; cursor: pointer; font-weight: 500; }
        .tag.active { background-color: var(--accent); color: white; border-color: var(--accent); }

        /* DASHBOARD */
        .dashboard-header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .avatar { width: 50px; height: 50px; background: var(--accent); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .user-info h2 { margin: 0; color: var(--primary); font-size: 1.2rem; }
        .user-info p { margin: 0; color: var(--text-muted); font-size: 0.9rem; }
        .logout-btn { background: transparent; border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px; cursor: pointer; }

        .filters-bar { width: 100%; display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .search-box { flex: 2; min-width: 250px;}
        .filter-box { flex: 1; min-width: 150px;}

        /* SEÇÕES DA ESTANTE */
        .section-title { width: 100%; font-size: 1.3rem; color: var(--primary); margin: 30px 0 15px 0; display: flex; align-items: center; gap: 10px;}
        .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; width: 100%; margin-bottom: 40px;}

        .book-card { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); position: relative; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; transition: 0.2s; }
        .book-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px -10px rgba(0,0,0,0.15); }
        .book-cover { width: 100%; aspect-ratio: 2/3; object-fit: cover; background-color: #e2e8f0; border-bottom: 1px solid var(--border); }
        .book-format-badge { position: absolute; top: 10px; right: 10px; background: rgba(15, 23, 42, 0.85); color: white; font-size: 0.7rem; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
        .book-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .book-title { font-size: 1rem; font-weight: 700; color: var(--primary); margin: 0 0 5px 0; line-height: 1.3; }
        .book-author { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 10px; }

        /* PÁGINA DE DETALHES */
        .book-details-layout { display: flex; gap: 40px; background: var(--card-bg); padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; }
        @media (max-width: 768px) { .book-details-layout { flex-direction: column; } }
        .details-left { flex: 1; max-width: 300px; }
        .details-cover { width: 100%; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .details-right { flex: 2; display: flex; flex-direction: column; }
        .details-title { font-size: 2rem; color: var(--primary); margin: 0 0 10px 0; }
        .details-author { font-size: 1.2rem; color: var(--text-muted); margin-bottom: 25px; }
        .details-format { display: inline-block; background: #f1f5f9; padding: 8px 16px; border-radius: 8px; font-weight: 600; color: var(--primary); margin-bottom: 25px; }
        .details-description { font-size: 1.05rem; line-height: 1.6; color: #475569; margin-bottom: 30px; }
        .btn-voltar { background: transparent; color: var(--text-muted); border: none; font-size: 1rem; cursor: pointer; display: flex; align-items: center; gap: 8px; margin-bottom: 20px; padding: 0; }
        .btn-voltar:hover { color: var(--primary); }
    </style>
</head>
<body>

<div class="app-container">

    <!-- TELA 1: LOGIN -->
    <div id="view-login" class="view hidden">
        <div class="card-panel">
            <div class="logo-header">
                <i class="fa-solid fa-book-bookmark"></i>
                <h1>SysLibrary</h1><p>Acesse sua conta para continuar</p>
            </div>
            <div class="input-wrapper">
                <i class="fa-regular fa-envelope"></i>
                <input type="email" id="login-email" placeholder="esther@email.com">
            </div>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="login-senha" placeholder="Sua senha">
            </div>
            <button class="btn" onclick="fazerLogin()">Entrar <i class="fa-solid fa-arrow-right"></i></button>
        </div>
    </div>

    <!-- TELA 2: ONBOARDING -->
    <div id="view-onboarding" class="view hidden">
        <div class="card-panel" style="max-width: 600px; text-align: center;">
            <div class="logo-header">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                <h2>O que você gosta de ler?</h2>
            </div>
            <div class="tags-grid" id="tags-container"></div>
            <button class="btn" onclick="salvarInteressesEIrParaDashboard()">Concluir Configuração</button>
        </div>
    </div>

    <!-- TELA 3: DASHBOARD -->
    <div id="view-dashboard" class="view">
        <div class="dashboard-header">
            <div class="user-info">
                <div class="avatar" id="user-avatar"></div>
                <div><h2 id="profile-name"></h2><p>Bem-vinda de volta!</p></div>
            </div>
            <button class="logout-btn" onclick="fazerLogout()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Sair</button>
        </div>

        <!-- BARRA DE BUSCA E FILTROS -->
        <div class="filters-bar">
            <div class="input-wrapper search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="busca-livro" placeholder="Pesquisar em todo o acervo da biblioteca..." oninput="aplicarFiltrosEBusca()">
            </div>
            <div class="input-wrapper filter-box">
                <i class="fa-solid fa-filter"></i>
                <select id="filtro-formato" onchange="aplicarFiltrosEBusca()">
                    <option value="Todos">Todos os Formatos</option>
                    <option value="Digital">Apenas Digital</option>
                    <option value="Físico">Apenas Físico</option>
                </select>
            </div>
        </div>

        <!-- CONTEÚDO NORMAL DO DASHBOARD -->
        <div id="dashboard-content" style="width: 100%;">
            <h3 class="section-title"><i class="fa-solid fa-book-open-reader"></i> Minha Estante</h3>
            <div class="books-grid" id="estante-pessoal-container"></div>

            <h3 class="section-title"><i class="fa-solid fa-star" style="color: #f59e0b;"></i> Recomendados para você</h3>
            <div class="books-grid" id="recomendados-container"></div>
        </div>

        <!-- RESULTADOS DA BUSCA -->
        <div id="busca-content" class="hidden" style="width: 100%;">
            <h3 class="section-title"><i class="fa-solid fa-list"></i> Resultados da Busca</h3>
            <div class="books-grid" id="resultados-busca-container"></div>
        </div>
    </div>

    <!-- TELA 4: DETALHES DO LIVRO -->
    <div id="view-detalhes" class="view hidden">
        <div style="width: 100%; max-width: 900px;">
            <button class="btn-voltar" onclick="voltarParaDashboard()"><i class="fa-solid fa-arrow-left"></i> Voltar</button>
            <div class="book-details-layout">
                <div class="details-left">
                    <img id="detalhe-capa" class="details-cover" alt="Capa">
                </div>
                <div class="details-right">
                    <h1 class="details-title" id="detalhe-titulo">Título</h1>
                    <div class="details-author" id="detalhe-autor">Autor</div>
                    <div><span class="details-format" id="detalhe-formato">Formato</span></div>
                    <h3 style="margin-bottom: 10px;">Sinopse:</h3>
                    <div class="details-description" id="detalhe-descricao">Descrição</div>

                    <div style="margin-top: auto;" id="area-botao-salvar">
                        <!-- Botão gerado pelo JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    let bancoDeLivros = [];
    const interessesSelecionados = new Set();
    let usuarioAtual = null;
    let livroAbertoAtual = null;

    async function inicializarApp() {
        try {
            const resposta = await fetch('http://localhost:8080/api/livros');
            bancoDeLivros = await resposta.json();

            const todasAsTags = new Set();
            bancoDeLivros.forEach(l => { if(l.tags) l.tags.forEach(t => todasAsTags.add(t)); });
            renderizarTagsDeOnboarding(todasAsTags);

            verificarSessao();
        } catch (erro) { alert("Erro ao conectar com o Servidor Java."); }
    }

    function mostrarTela(idTela) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById(idTela).classList.remove('hidden');
        window.scrollTo(0, 0);
    }

    function verificarSessao() {
        const usuarioSalvo = localStorage.getItem('usuarioSysLibrary');
        if (usuarioSalvo) {
            usuarioAtual = JSON.parse(usuarioSalvo);
            if (usuarioAtual.interesses.length > 0) carregarDashboard();
            else mostrarTela('view-onboarding');
        } else { mostrarTela('view-login'); }
    }

    function fazerLogin() {
        const email = document.getElementById('login-email').value.trim();
        const senha = document.getElementById('login-senha').value.trim();
        if(!email || !senha) { alert("Preencha email e senha!"); return; }

        const nome = email.split('@')[0].toUpperCase();
        usuarioAtual = { email: email, nome: nome, interesses: [], estante: [] };
        localStorage.setItem('usuarioSysLibrary', JSON.stringify(usuarioAtual));
        mostrarTela('view-onboarding');
    }

    function renderizarTagsDeOnboarding(tags) {
        const container = document.getElementById('tags-container');
        container.innerHTML = '';
        tags.forEach(interesse => {
            const tagBtn = document.createElement('div');
            tagBtn.className = 'tag'; tagBtn.innerHTML = `<i class="fa-solid fa-hashtag"></i> ${interesse}`;
            tagBtn.onclick = () => {
                tagBtn.classList.toggle('active');
                if (interessesSelecionados.has(interesse)) interessesSelecionados.delete(interesse);
                else interessesSelecionados.add(interesse);
            };
            container.appendChild(tagBtn);
        });
    }

    function salvarInteressesEIrParaDashboard() {
        usuarioAtual.interesses = Array.from(interessesSelecionados);
        localStorage.setItem('usuarioSysLibrary', JSON.stringify(usuarioAtual));
        carregarDashboard();
    }

    function fazerLogout() {
        localStorage.removeItem('usuarioSysLibrary');
        usuarioAtual = null; interessesSelecionados.clear();
        document.getElementById('login-email').value = '';
        document.getElementById('login-senha').value = '';
        mostrarTela('view-login');
    }

    function carregarDashboard() {
        mostrarTela('view-dashboard');
        document.getElementById('profile-name').textContent = usuarioAtual.nome;
        document.getElementById('user-avatar').innerHTML = usuarioAtual.nome.charAt(0);

        // Reseta os inputs ao voltar pro dashboard
        document.getElementById('busca-livro').value = '';
        document.getElementById('filtro-formato').value = 'Todos';

        aplicarFiltrosEBusca();
    }

    // FUNÇÃO UNIFICADA: BUSCA + FILTRO DE FORMATO
    function aplicarFiltrosEBusca() {
        const termo = document.getElementById('busca-livro').value.toLowerCase();
        const formatoFiltro = document.getElementById('filtro-formato').value;

        // 1. Aplica o filtro de formato na base de dados inteira primeiro
        let acervoFiltrado = bancoDeLivros;
        if (formatoFiltro !== 'Todos') {
            acervoFiltrado = acervoFiltrado.filter(l => l.formato === formatoFiltro);
        }

        if (termo.length === 0) {
            // Modo Dashboard Normal (Mostra Estante e Recomendados)
            document.getElementById('dashboard-content').classList.remove('hidden');
            document.getElementById('busca-content').classList.add('hidden');

            const livrosSalvos = acervoFiltrado.filter(l => usuarioAtual.estante.includes(l.id));
            renderizarGrid(livrosSalvos, 'estante-pessoal-container', "Nenhum livro salvo com este formato.");

            const recomendados = acervoFiltrado.filter(l =>
                !usuarioAtual.estante.includes(l.id) &&
                l.tags && l.tags.some(t => usuarioAtual.interesses.includes(t))
            );
            renderizarGrid(recomendados, 'recomendados-container', "Nenhuma recomendação atende ao filtro.");
        } else {
            // Modo Busca Global (Procura título/autor dentro do acervo filtrado)
            document.getElementById('dashboard-content').classList.add('hidden');
            document.getElementById('busca-content').classList.remove('hidden');

            const resultados = acervoFiltrado.filter(l =>
                l.titulo.toLowerCase().includes(termo) || l.autor.toLowerCase().includes(termo)
            );
            renderizarGrid(resultados, 'resultados-busca-container', "Nenhum livro encontrado com esse nome e formato.");
        }
    }

    function renderizarGrid(livros, containerId, msgVazio) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        if (livros.length === 0) {
            container.innerHTML = `<p style="color: var(--text-muted); grid-column: 1/-1;">${msgVazio}</p>`;
            return;
        }
        livros.forEach(livro => {
            const icon = livro.formato === 'Digital' ? '<i class="fa-solid fa-tablet-screen-button"></i>' : '<i class="fa-solid fa-book"></i>';
            container.innerHTML += `
                    <div class="book-card" onclick="abrirPaginaDoLivro(${livro.id})">
                        <span class="book-format-badge">${icon}</span>
                        <img src="${livro.capaUrl}" alt="Capa" class="book-cover">
                        <div class="book-info">
                            <h4 class="book-title">${livro.titulo}</h4>
                            <div class="book-author">${livro.autor}</div>
                        </div>
                    </div>
                `;
        });
    }

    // PÁGINA DO LIVRO E BOTÃO DE SALVAR
    function abrirPaginaDoLivro(livroId) {
        livroAbertoAtual = bancoDeLivros.find(l => l.id === livroId);
        if(livroAbertoAtual) {
            document.getElementById('detalhe-titulo').textContent = livroAbertoAtual.titulo;
            document.getElementById('detalhe-autor').innerHTML = `<i class="fa-regular fa-user"></i> ${livroAbertoAtual.autor}`;
            document.getElementById('detalhe-formato').innerHTML = `<i class="fa-solid fa-bookmark"></i> Formato: ${livroAbertoAtual.formato}`;
            document.getElementById('detalhe-descricao').textContent = livroAbertoAtual.descricao;
            document.getElementById('detalhe-capa').src = livroAbertoAtual.capaUrl;

            atualizarBotaoSalvar();
            mostrarTela('view-detalhes');
        }
    }

    function atualizarBotaoSalvar() {
        const areaBotao = document.getElementById('area-botao-salvar');
        const jaEstaNaEstante = usuarioAtual.estante.includes(livroAbertoAtual.id);

        if (jaEstaNaEstante) {
            areaBotao.innerHTML = `
                    <button class="btn btn-danger" style="max-width: 250px;" onclick="removerDaEstante()">
                        <i class="fa-solid fa-trash"></i> Remover da Estante
                    </button>`;
        } else {
            areaBotao.innerHTML = `
                    <button class="btn" style="max-width: 250px;" onclick="adicionarNaEstante()">
                        <i class="fa-solid fa-plus"></i> Adicionar à Estante
                    </button>`;
        }
    }

    function adicionarNaEstante() {
        usuarioAtual.estante.push(livroAbertoAtual.id);
        localStorage.setItem('usuarioSysLibrary', JSON.stringify(usuarioAtual));
        atualizarBotaoSalvar();
    }

    function removerDaEstante() {
        usuarioAtual.estante = usuarioAtual.estante.filter(id => id !== livroAbertoAtual.id);
        localStorage.setItem('usuarioSysLibrary', JSON.stringify(usuarioAtual));
        atualizarBotaoSalvar();
    }

    function voltarParaDashboard() {
        carregarDashboard();
    }

    window.onload = inicializarApp;
</script>
</body>
</html>
